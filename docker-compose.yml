# Local development stack for ProcessScout.
# Host-side ports are shifted (see .env) to avoid collisions with other local stacks.
# Internal container ports stay standard.

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: processscout-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5532}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: processscout-redis
    ports:
      - "${REDIS_PORT:-6479}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: processscout-backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      # Accept either LANGFUSE_HOST (Python SDK convention) or LANGFUSE_BASE_URL (newer docs).
      LANGFUSE_HOST: ${LANGFUSE_HOST:-${LANGFUSE_BASE_URL:-}}
      COST_LIMIT_PER_DAY_USD: ${COST_LIMIT_PER_DAY_USD:-5}
      COST_LIMIT_PER_MONTH_USD: ${COST_LIMIT_PER_MONTH_USD:-50}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      UVICORN_RELOAD: "true"
    ports:
      - "${BACKEND_PORT:-8800}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./seed:/app/seed:ro
      - backend_uploads:/app/uploads
      - hf_cache:/root/.cache/huggingface
      # Read-only Docker socket mount powers the SuperAdmin container-health view.
      # Single-tenant POC tradeoff documented in CLAUDE.md §3a — revisit for multi-tenant.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: processscout-frontend
    environment:
      VITE_API_TARGET: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-5273}:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

  worker:
    build: ./backend
    container_name: processscout-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      COST_LIMIT_PER_DAY_USD: ${COST_LIMIT_PER_DAY_USD:-5}
      COST_LIMIT_PER_MONTH_USD: ${COST_LIMIT_PER_MONTH_USD:-50}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./seed:/app/seed:ro
      - backend_uploads:/app/uploads
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  db_data:
  backend_uploads:
  frontend_node_modules:
  hf_cache:
