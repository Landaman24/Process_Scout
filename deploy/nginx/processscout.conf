# ProcessScout — Nginx server block for the Hostinger VPS.
#
# Lives at:        /etc/nginx/sites-available/processscout.conf
# Symlink to:      /etc/nginx/sites-enabled/processscout.conf
#
# Per CLAUDE.md §1 (Strict Isolation from LeadSolution): this is a separate server
# block — Nginx routes purely by Host header, so process-scout.com and the existing
# trailmarkai.com vhosts coexist on the same VPS with zero coupling.
#
# Deployment workflow:
#   1. Point process-scout.com DNS at the VPS (A @ + CNAME www → A apex; optional A *)
#   2. Drop this file at /etc/nginx/sites-available/processscout.conf
#   3. ln -s /etc/nginx/sites-available/processscout.conf /etc/nginx/sites-enabled/
#   4. Bring up only the HTTP block first, then run:
#        sudo certbot --nginx -d process-scout.com -d www.process-scout.com
#      certbot will rewrite this file to add the SSL block and HTTPS redirect.
#   5. systemctl reload nginx
#   6. Verify: curl -I https://process-scout.com/health

# ---------------------------------------------------------------------------------
# HTTP — redirect to HTTPS once certbot has run.
# Until then, certbot's --nginx plugin uses this block to serve the ACME challenge.
# ---------------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name process-scout.com www.process-scout.com;

    # ACME challenge stays on HTTP for cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------------
# HTTPS — main vhost.
# ssl_certificate paths are populated by certbot on first run.
# ---------------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name process-scout.com www.process-scout.com;

    # SSL config — these paths are written by certbot
    ssl_certificate /etc/letsencrypt/live/process-scout.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/process-scout.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Reasonable defaults
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss;
    client_max_body_size 50M;   # PDF uploads can be large

    # Security headers (basic — tighten for production)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ----------- Backend API ----------------------------------------------------
    # Host port 8800 maps to the backend container's internal 8000
    # (BACKEND_PORT env, see .env.example).
    location /api/ {
        proxy_pass http://127.0.0.1:8800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # LLM calls can be slow — give them room.
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Backend root health probe
    location = /health {
        proxy_pass http://127.0.0.1:8800/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ----------- Frontend -------------------------------------------------------
    # Currently proxies to the Vite dev server (port 5273 in dev). For production
    # traffic, replace this block with a static-file location pointing at
    # /opt/processscout/frontend/dist/, served directly by Nginx. The Vite dev
    # server is fine for an interview-stage POC but not designed for prod load.
    location / {
        proxy_pass http://127.0.0.1:5273;
        proxy_http_version 1.1;

        # WebSocket upgrade for Vite HMR (harmless on production builds)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ----------- Direct PDF citation links --------------------------------------
    # The chat UI links citations to /api/v1/documents/{id}/file#page=N, which is
    # already covered by the /api/ block above. No special location needed.
}
