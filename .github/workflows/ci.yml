name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg://ci:ci@localhost/ci
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-do-not-reuse-anywhere-real
      OPENROUTER_API_KEY: ""
      SUPERADMIN_EMAIL: ci@example.local
      SUPERADMIN_PASSWORD: CiPassword123
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install CPU torch
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir --index-url https://download.pytorch.org/whl/cpu "torch>=2.2,<3"

      - name: Install backend deps
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run migrations against the service Postgres
        working-directory: backend
        run: alembic upgrade head

      - name: Run pytest
        working-directory: backend
        run: pytest -v

  frontend:
    name: Frontend — type-check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build (tsc + vite)
        working-directory: frontend
        run: npm run build

  docker-compose:
    name: Compose — config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file parses
        run: |
          cp .env.example .env
          docker compose --env-file .env config --quiet
